name: Collect and Publish Iteration 16 Market Data

run-name: Iteration 16 publication #${{ github.run_number }}

on:
  workflow_dispatch:
  schedule:
    - cron: "45 23 * * 1-5"

permissions:
  contents: write

concurrency:
  group: iteration-16-market-publication
  cancel-in-progress: false

jobs:
  collect-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PYTHONUNBUFFERED: "1"
      DATA_BRANCH: iteration-16-market-data

    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Restrict publishing to main
        run: |
          test "$GITHUB_REF" = "refs/heads/main" || {
            echo "Publishing is permitted only from main." >&2
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Compile Python modules
        run: python -m compileall -q scripts tests

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Collect, validate, and publish immutable snapshot
        run: bash scripts/publish_market_snapshot.sh

      - name: Upload publication evidence
        uses: actions/upload-artifact@v7
        with:
          name: iteration-16-market-publication-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.ARTIFACT_ROOT }}
          if-no-files-found: error
          retention-days: 3
