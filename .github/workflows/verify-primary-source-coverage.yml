name: PPI primary-source live coverage verification
run-name: PPI primary-source live coverage verification

on:
  schedule:
    - cron: "45 23 * * 1-5"
  workflow_dispatch:
    inputs:
      sec_user_agent:
        description: Optional SEC user agent override; otherwise uses repository variable PPI_SEC_USER_AGENT
        required: false
        default: ""
        type: string
      lookback_days:
        description: Number of calendar days to inspect, from 1 through 30
        required: false
        default: "30"
        type: string

permissions:
  contents: read

concurrency:
  group: ppi-primary-source-live-coverage-verification
  cancel-in-progress: false

jobs:
  verify:
    name: Verify live official-source and SEC enrichment coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SEC_USER_AGENT: ${{ github.event_name == 'schedule' && vars.PPI_SEC_USER_AGENT || inputs.sec_user_agent || vars.PPI_SEC_USER_AGENT }}
      LOOKBACK_DAYS: ${{ github.event_name == 'schedule' && '30' || inputs.lookback_days || '30' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate configuration
        run: |
          set -euo pipefail
          test -n "$SEC_USER_AGENT" || {
            echo "Set repository variable PPI_SEC_USER_AGENT to an SEC-compliant organization and contact email." >&2
            exit 1
          }
          case "$SEC_USER_AGENT" in
            *@*) ;;
            *) echo "SEC user agent must contain a contact email" >&2; exit 1 ;;
          esac
          python - <<'PY'
          import os
          value = int(os.environ["LOOKBACK_DAYS"])
          assert 1 <= value <= 30
          if os.environ["GITHUB_EVENT_NAME"] == "schedule":
              assert value == 30
          PY

      - name: Compile verification modules
        run: |
          python -m py_compile \
            news/src/ai_market_news/collector_common.py \
            news/src/ai_market_news/live_http.py \
            news/src/ai_market_news/sec_adapter.py \
            news/src/ai_market_news/sec_adapter_compat.py \
            news/src/ai_market_news/company_feed_adapter.py \
            news/src/ai_market_news/company_source_compat.py \
            news/src/ai_market_news/company_source_live_compat.py \
            news/src/ai_market_news/collect_sec.py \
            news/src/ai_market_news/collect_company_releases.py \
            news/src/ai_market_news/transform_news.py \
            news/src/ai_market_news/assess_source_novelty.py \
            news/src/ai_market_news/verify_live_source_coverage.py

      - name: Run verification regression tests
        env:
          PYTHONPATH: news/src
        run: |
          python -m unittest \
            news.tests.test_company_source_compat \
            news.tests.test_sec_enrichment_policy \
            news.tests.test_assess_source_novelty \
            news.tests.test_verify_live_source_coverage \
            news.tests.test_r10_source_period_dispatch -v

      - name: Collect live primary sources
        env:
          PYTHONPATH: news/src
        run: |
          set -euo pipefail
          mkdir -p source-verification/records source-verification/metrics source-verification/report
          COLLECTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python -m ai_market_news.collect_sec \
            --mode live \
            --config news/config/sec_companies.json \
            --output source-verification/records/sec.jsonl \
            --metrics-output source-verification/metrics/sec.json \
            --collected-at "$COLLECTED_AT" \
            --user-agent "$SEC_USER_AGENT" \
            --lookback-days "$LOOKBACK_DAYS"
          python -m ai_market_news.collect_company_releases \
            --mode live \
            --config news/config/official_company_sources.json \
            --output source-verification/records/company.jsonl \
            --metrics-output source-verification/metrics/company.json \
            --collected-at "$COLLECTED_AT" \
            --user-agent "PPI ai-market-news (+https://github.com/poudlesuman32-star/ai-market-news)" \
            --lookback-days "$LOOKBACK_DAYS"

      - name: Build timestamp-independent source-period receipt
        env:
          PYTHONPATH: news/src
        run: |
          set -euo pipefail
          python -m ai_market_news.transform_news \
            --input source-verification/records/sec.jsonl \
            --input source-verification/records/company.jsonl \
            --output source-verification/records/news.jsonl
          git fetch --no-tags origin public-news-data:refs/remotes/origin/public-news-data
          git show refs/remotes/origin/public-news-data:latest.json > source-verification/metrics/latest.json
          SNAPSHOT_PATH="$(python - <<'PY'
          import json
          from pathlib import Path
          latest = json.loads(Path('source-verification/metrics/latest.json').read_text(encoding='utf-8'))
          path = latest.get('snapshot_path')
          assert isinstance(path, str) and path.startswith('snapshots/')
          print(path)
          PY
          )"
          git show "refs/remotes/origin/public-news-data:${SNAPSHOT_PATH}/news.jsonl" \
            > source-verification/metrics/previous-news.jsonl
          python -m ai_market_news.assess_source_novelty \
            --current source-verification/records/news.jsonl \
            --previous source-verification/metrics/previous-news.jsonl \
            --minimum-new-records 1 \
            --output source-verification/report/source-period.json \
            --report-only

      - name: Verify exact source coverage
        env:
          PYTHONPATH: news/src
        run: |
          python -m ai_market_news.verify_live_source_coverage \
            --company-config news/config/official_company_sources.json \
            --sec-config news/config/sec_companies.json \
            --company-metrics source-verification/metrics/company.json \
            --sec-metrics source-verification/metrics/sec.json \
            --company-records source-verification/records/company.jsonl \
            --sec-records source-verification/records/sec.jsonl \
            --output source-verification/report/coverage.json

      - name: Retain immutable verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ppi-primary-source-coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: source-verification/
          retention-days: 30
          if-no-files-found: error

      - name: Dispatch exact successful run to private source-period validator
        env:
          GH_TOKEN: ${{ secrets.PPI_CROSS_REPOSITORY_AUTOMATION }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          gh api --method POST \
            "repos/musksuman3/ai-signal-engine/actions/workflows/ppi-r10-source-period-validation.yml/dispatches" \
            -f ref=main \
            -f "inputs[public_workflow_run_id]=${GITHUB_RUN_ID}" \
            -f "inputs[public_workflow_run_attempt]=${GITHUB_RUN_ATTEMPT}" \
            -f "inputs[public_head_sha]=${GITHUB_SHA}"

      - name: Confirm read-only boundary
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/verify-primary-source-coverage.yml').read_text(encoding='utf-8')
          forbidden = (
              'contents:' + ' write',
              'pull-requests:' + ' write',
              'git ' + 'push',
              'repository_' + 'dispatch',
              'gh pr ' + 'create',
              'gh pr ' + 'merge',
          )
          for value in forbidden:
              assert value not in text, value
          assert 'permissions:\n  contents: read' in text
          assert 'schedule:\n    - cron: "45 23 * * 1-5"' in text
          assert text.count('cron: "45 23 * * 1-5"') == 1
          assert "github.event_name == 'schedule'" in text
          assert '--report-only' in text
          assert 'registration_' + 'authorized' not in text
          assert 'ppi-r10-source-period-validation.yml/dispatches' in text
          assert 'PPI_CROSS_REPOSITORY_AUTOMATION' in text
          PY
