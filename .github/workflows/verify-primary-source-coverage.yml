name: PPI primary-source live coverage verification
run-name: PPI primary-source live coverage verification

on:
  schedule:
    - cron: "15 1,7,13,19 * * 1-5"
  workflow_dispatch:
    inputs:
      sec_user_agent:
        description: Optional SEC user agent override; otherwise uses repository variable PPI_SEC_USER_AGENT
        required: false
        default: ""
        type: string
      lookback_days:
        description: Number of calendar days to inspect, from 1 through 30
        required: false
        default: "30"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: ppi-primary-source-live-coverage-verification
  cancel-in-progress: false

jobs:
  verify:
    name: Verify live official-source and SEC enrichment coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SEC_USER_AGENT: ${{ github.event_name == 'schedule' && vars.PPI_SEC_USER_AGENT || inputs.sec_user_agent || vars.PPI_SEC_USER_AGENT }}
      LOOKBACK_DAYS: ${{ github.event_name == 'schedule' && '30' || inputs.lookback_days || '30' }}
      R10_NOVELTY_BASELINE_CONFIG: news/config/r10_novelty_baseline.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate configuration
        run: |
          set -euo pipefail
          test -n "$SEC_USER_AGENT" || {
            echo "Set repository variable PPI_SEC_USER_AGENT to an SEC-compliant organization and contact email." >&2
            exit 1
          }
          case "$SEC_USER_AGENT" in
            *@*) ;;
            *) echo "SEC user agent must contain a contact email" >&2; exit 1 ;;
          esac
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          value = int(os.environ["LOOKBACK_DAYS"])
          assert 1 <= value <= 30
          if os.environ["GITHUB_EVENT_NAME"] == "schedule":
              assert value == 30

          baseline = json.loads(Path(os.environ["R10_NOVELTY_BASELINE_CONFIG"]).read_text(encoding="utf-8"))
          assert baseline["schema_version"] == "1.0.0"
          assert isinstance(baseline["sequence"], int) and baseline["sequence"] > 0
          assert re.fullmatch(r"[1-9][0-9]*", baseline["run_id"])
          assert isinstance(baseline["run_attempt"], int) and baseline["run_attempt"] > 0
          assert re.fullmatch(r"[0-9a-f]{40}", baseline["head_sha"])
          assert baseline["artifact_name"] == f"ppi-primary-source-coverage-{baseline['run_id']}-{baseline['run_attempt']}"
          assert re.fullmatch(r"[0-9a-f]{64}", baseline["artifact_sha256"])
          assert isinstance(baseline["identity_count"], int) and baseline["identity_count"] > 0
          assert re.fullmatch(r"[0-9a-f]{64}", baseline["identity_set_sha256"])
          assert baseline["repository"] == os.environ["GITHUB_REPOSITORY"]
          PY

      - name: Compile verification modules
        run: |
          python -m py_compile \
            news/src/ai_market_news/collector_common.py \
            news/src/ai_market_news/live_http.py \
            news/src/ai_market_news/sec_adapter.py \
            news/src/ai_market_news/sec_adapter_compat.py \
            news/src/ai_market_news/company_feed_adapter.py \
            news/src/ai_market_news/company_source_compat.py \
            news/src/ai_market_news/company_source_live_compat.py \
            news/src/ai_market_news/collect_sec.py \
            news/src/ai_market_news/collect_company_releases.py \
            news/src/ai_market_news/transform_news.py \
            news/src/ai_market_news/assess_source_novelty.py \
            news/src/ai_market_news/verify_live_source_coverage.py

      - name: Run verification regression tests
        env:
          PYTHONPATH: news/src
        run: |
          python -m unittest \
            news.tests.test_company_source_compat \
            news.tests.test_sec_enrichment_policy \
            news.tests.test_assess_source_novelty \
            news.tests.test_verify_live_source_coverage \
            news.tests.test_r10_source_period_dispatch \
            news.tests.test_r10_novelty_baseline -v

      - name: Collect live primary sources
        env:
          PYTHONPATH: news/src
        run: |
          set -euo pipefail
          mkdir -p source-verification/records source-verification/metrics source-verification/report
          COLLECTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python -m ai_market_news.collect_sec \
            --mode live \
            --config news/config/sec_companies.json \
            --output source-verification/records/sec.jsonl \
            --metrics-output source-verification/metrics/sec.json \
            --collected-at "$COLLECTED_AT" \
            --user-agent "$SEC_USER_AGENT" \
            --lookback-days "$LOOKBACK_DAYS"
          python -m ai_market_news.collect_company_releases \
            --mode live \
            --config news/config/official_company_sources.json \
            --output source-verification/records/company.jsonl \
            --metrics-output source-verification/metrics/company.json \
            --collected-at "$COLLECTED_AT" \
            --user-agent "PPI ai-market-news (+https://github.com/poudlesuman32-star/ai-market-news)" \
            --lookback-days "$LOOKBACK_DAYS"

      - name: Load exact accepted R10 novelty baseline identity
        run: |
          set -euo pipefail
          python - <<'PY' >> "$GITHUB_ENV"
          import json
          import os
          from pathlib import Path

          value = json.loads(Path(os.environ["R10_NOVELTY_BASELINE_CONFIG"]).read_text(encoding="utf-8"))
          for key in (
              "run_id",
              "run_attempt",
              "head_sha",
              "artifact_name",
              "artifact_sha256",
              "identity_count",
              "identity_set_sha256",
          ):
              print(f"BASELINE_{key.upper()}={value[key]}")
          PY

      - name: Materialize exact accepted R10 novelty baseline
        env:
          GH_TOKEN: ${{ github.token }}
          PYTHONPATH: news/src
        run: |
          set -euo pipefail
          mkdir -p source-verification/baseline source-verification/metrics
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${BASELINE_RUN_ID}" \
            > source-verification/metrics/baseline-run.json
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${BASELINE_RUN_ID}/artifacts?per_page=100" \
            > source-verification/metrics/baseline-artifacts.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run = json.loads(Path("source-verification/metrics/baseline-run.json").read_text(encoding="utf-8"))
          artifacts = json.loads(Path("source-verification/metrics/baseline-artifacts.json").read_text(encoding="utf-8"))["artifacts"]
          assert str(run["id"]) == os.environ["BASELINE_RUN_ID"]
          assert run["path"] == ".github/workflows/verify-primary-source-coverage.yml"
          assert run["head_branch"] == "main"
          assert run["head_sha"] == os.environ["BASELINE_HEAD_SHA"]
          assert run["status"] == "completed" and run["conclusion"] == "success"
          matches = [
              item for item in artifacts
              if item.get("name") == os.environ["BASELINE_ARTIFACT_NAME"] and not item.get("expired")
          ]
          assert len(matches) == 1, matches
          assert matches[0].get("digest") == "sha256:" + os.environ["BASELINE_ARTIFACT_SHA256"]
          PY
          gh run download "$BASELINE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "$BASELINE_ARTIFACT_NAME" \
            --dir source-verification/baseline
          test -s source-verification/baseline/records/news.jsonl
          python - <<'PY'
          import os
          from pathlib import Path
          from ai_market_news.assess_source_novelty import content_fingerprint, identity_key, read_jsonl

          records = read_jsonl(Path("source-verification/baseline/records/news.jsonl"))
          keys = {identity_key(record) for record in records}
          assert len(keys) == len(records) == int(os.environ["BASELINE_IDENTITY_COUNT"])
          assert content_fingerprint(keys) == os.environ["BASELINE_IDENTITY_SET_SHA256"]
          PY

      - name: Build timestamp-independent source-period receipt
        env:
          PYTHONPATH: news/src
        run: |
          set -euo pipefail
          python -m ai_market_news.transform_news \
            --input source-verification/records/sec.jsonl \
            --input source-verification/records/company.jsonl \
            --output source-verification/records/news.jsonl
          python -m ai_market_news.assess_source_novelty \
            --current source-verification/records/news.jsonl \
            --previous source-verification/baseline/records/news.jsonl \
            --minimum-new-records 1 \
            --output source-verification/report/source-period.json \
            --report-only
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          config = json.loads(Path(os.environ["R10_NOVELTY_BASELINE_CONFIG"]).read_text(encoding="utf-8"))
          report_path = Path("source-verification/report/source-period.json")
          report = json.loads(report_path.read_text(encoding="utf-8"))
          assert report["previous_source_content_sha256"] == config["identity_set_sha256"]
          report["baseline"] = {
              "sequence": config["sequence"],
              "run_id": config["run_id"],
              "run_attempt": config["run_attempt"],
              "head_sha": config["head_sha"],
              "artifact_name": config["artifact_name"],
              "artifact_sha256": config["artifact_sha256"],
              "identity_count": config["identity_count"],
              "identity_set_sha256": config["identity_set_sha256"],
          }
          report_path.write_text(json.dumps(report, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Verify exact source coverage
        env:
          PYTHONPATH: news/src
        run: |
          python -m ai_market_news.verify_live_source_coverage \
            --company-config news/config/official_company_sources.json \
            --sec-config news/config/sec_companies.json \
            --company-metrics source-verification/metrics/company.json \
            --sec-metrics source-verification/metrics/sec.json \
            --company-records source-verification/records/company.jsonl \
            --sec-records source-verification/records/sec.jsonl \
            --output source-verification/report/coverage.json

      - name: Retain immutable verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ppi-primary-source-coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: source-verification/
          retention-days: 90
          if-no-files-found: error

      - name: Dispatch exact successful run to private source-period validator
        env:
          GH_TOKEN: ${{ secrets.PPI_CROSS_REPOSITORY_AUTOMATION }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          gh api --method POST \
            "repos/musksuman3/ai-signal-engine/actions/workflows/ppi-r10-source-period-validation.yml/dispatches" \
            -f ref=main \
            -f "inputs[public_workflow_run_id]=${GITHUB_RUN_ID}" \
            -f "inputs[public_workflow_run_attempt]=${GITHUB_RUN_ATTEMPT}" \
            -f "inputs[public_head_sha]=${GITHUB_SHA}"

      - name: Confirm read-only boundary
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/verify-primary-source-coverage.yml').read_text(encoding='utf-8')
          forbidden = (
              'contents:' + ' write',
              'pull-requests:' + ' write',
              'git ' + 'push',
              'repository_' + 'dispatch',
              'gh pr ' + 'create',
              'gh pr ' + 'merge',
          )
          for value in forbidden:
              assert value not in text, value
          cron = '15 1,7,13,19 * * ' + '1-5'
          assert f'schedule:\n    - cron: "{cron}"' in text
          assert text.count(f'cron: "{cron}"') == 1
          assert 'permissions:\n  contents: read\n  actions: read' in text
          assert "github.event_name == 'schedule'" in text
          assert '--report-only' in text
          assert 'registration_' + 'authorized' not in text
          assert 'ppi-r10-source-period-validation.yml/dispatches' in text
          assert 'PPI_CROSS_REPOSITORY_AUTOMATION' in text
          assert 'r10_novelty_baseline.json' in text
          assert 'gh run download "$BASELINE_RUN_ID"' in text
          assert 'public-news-data:latest.json' not in text
          PY
