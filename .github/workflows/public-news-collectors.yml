name: PPI public news pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - "news/**"
      - "scripts/publish_public_news_snapshot.sh"
      - ".github/workflows/public-news-collectors.yml"
      - ".github/workflows/collect-public-news.yml"
      - ".github/workflows/collect-public-news-live.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ppi-public-news-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate fixture, live-primary, and R5 operational gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile public news modules
        run: |
          python -m py_compile \
            news/src/ai_market_news/collector_common.py \
            news/src/ai_market_news/live_http.py \
            news/src/ai_market_news/sec_adapter.py \
            news/src/ai_market_news/company_feed_adapter.py \
            news/src/ai_market_news/collect_sec.py \
            news/src/ai_market_news/collect_company_releases.py \
            news/src/ai_market_news/normalize_news.py \
            news/src/ai_market_news/deduplicate_news.py \
            news/src/ai_market_news/tag_catalysts.py \
            news/src/ai_market_news/tag_infrastructure_layers.py \
            news/src/ai_market_news/transform_news.py \
            news/src/ai_market_news/build_preview_artifacts.py \
            news/src/ai_market_news/preview_gate.py \
            news/src/ai_market_news/build_news_manifest.py \
            news/src/ai_market_news/build_news_latest_pointer.py \
            news/src/ai_market_news/verify_news_publication_transaction.py
          bash -n scripts/publish_public_news_snapshot.sh

      - name: Run public news tests
        env:
          PYTHONPATH: news/src
        run: python -m unittest discover -s news/tests -p "test_*.py" -v

      - name: Validate current preview gate
        env:
          PYTHONPATH: news/src
        run: |
          python -m ai_market_news.preview_gate validate \
            --gate news/config/public_news_preview_gate.json
          python - <<'PY'
          import json
          from pathlib import Path

          from ai_market_news.collector_common import CollectorError
          from ai_market_news.preview_gate import require_publication_authorized

          gate = json.loads(Path("news/config/public_news_preview_gate.json").read_text(encoding="utf-8"))
          authorized = False
          try:
              require_publication_authorized(gate)
              authorized = True
          except CollectorError:
              authorized = False

          assert authorized is gate["publication_authorized"]
          assert gate["contents_write_permission_authorized"] is gate["publication_authorized"]
          if authorized:
              assert gate["gate_satisfied"] is True
              assert gate["review_approved"] is True
              assert gate["approved_by"]
              assert gate["approved_at_utc"]
          else:
              assert gate["review_approved"] is False
          PY

      - name: Run deterministic fixture preview
        env:
          PYTHONPATH: news/src
        run: |
          mkdir -p public-news-preview
          python -m ai_market_news.collect_sec \
            --input news/tests/fixtures/sec_filings.json \
            --output public-news-preview/sec.jsonl \
            --collected-at 2026-07-10T18:00:00Z
          python -m ai_market_news.collect_company_releases \
            --input news/tests/fixtures/company_releases.json \
            --output public-news-preview/company.jsonl \
            --collected-at 2026-07-10T18:00:00Z
          python -m ai_market_news.transform_news \
            --input public-news-preview/sec.jsonl \
            --input public-news-preview/company.jsonl \
            --output public-news-preview/news.jsonl
          python -m ai_market_news.transform_news \
            --input public-news-preview/company.jsonl \
            --input public-news-preview/sec.jsonl \
            --output public-news-preview/news-reversed.jsonl
          test "$(wc -l < public-news-preview/news.jsonl)" -eq 4
          cmp public-news-preview/news.jsonl public-news-preview/news-reversed.jsonl
          python -m ai_market_news.build_preview_artifacts \
            --news public-news-preview/news.jsonl \
            --receipt-output public-news-preview/collection_receipt.json \
            --manifest-output public-news-preview/news_manifest.preview.json \
            --report-output public-news-preview/run_report.json \
            --source-commit 0000000000000000000000000000000000000000 \
            --run-id ci-preview \
            --generated-at 2026-07-10T18:00:00Z \
            --collection-mode fixture \
            --workflow-event workflow_dispatch \
            --workflow-run-id 1 \
            --workflow-run-attempt 1 \
            --runtime-seconds 1 \
            --raw-event-count 4 \
            --normalized-event-count 4 \
            --duplicate-count 0 \
            --provider-failures-json '[]'
          python - <<'PY'
          import json
          from pathlib import Path

          rows = [json.loads(line) for line in Path("public-news-preview/news.jsonl").read_text(encoding="utf-8").splitlines()]
          report = json.loads(Path("public-news-preview/run_report.json").read_text(encoding="utf-8"))
          assert all(row["validation"] == "transformed_valid" for row in rows)
          assert all(row["synthetic_content_used"] is False for row in rows)
          assert all(row["source_content_modified"] is False for row in rows)
          assert report["publication_enabled"] is False
          assert report["published_to_repository"] is False
          assert report["this_run_qualifies"] is True
          assert report["required_successful_preview_runs"] == 5
          PY

      - name: Confirm workflow safety boundaries
        run: |
          python - <<'PY'
          from pathlib import Path

          validation = Path(".github/workflows/public-news-collectors.yml").read_text(encoding="utf-8")
          fixture_preview = Path(".github/workflows/collect-public-news.yml").read_text(encoding="utf-8")
          live_preview = Path(".github/workflows/collect-public-news-live.yml").read_text(encoding="utf-8")
          publisher = Path("scripts/publish_public_news_snapshot.sh").read_text(encoding="utf-8")

          for text in (validation, fixture_preview):
              for value in ("secrets" + ".", "sche" + "dule:", "contents:" + " write", "git " + "push"):
                  assert value not in text, f"forbidden workflow capability: {value}"

          for value in ("secrets" + ".", "contents:" + " write", "git " + "push", "repository_" + "dispatch"):
              assert value not in live_preview, f"forbidden live-preview capability: {value}"

          assert 'cron: "15 13 * * 1-5"' in live_preview
          assert "PPI_SEC_USER_AGENT" in live_preview
          assert 'SCHEDULED_LOOKBACK_DAYS: "30"' in live_preview
          assert "public-news-data" not in fixture_preview
          assert "public-news-data" not in live_preview
          assert "live_primary_sources" in live_preview
          assert "workflow_dispatch" in live_preview
          assert "article_pages_fetched" not in live_preview
          assert "require-publication" in publisher
          assert publisher.count('git -C "$PUBLISH_ROOT" push') == 1
          assert "iteration-16-market-data" not in publisher
          PY
