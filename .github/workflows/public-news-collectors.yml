name: PPI public news pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - "news/**"
      - ".github/workflows/public-news-collectors.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ppi-public-news-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate fixture-driven collection and transformation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile public news modules
        run: |
          python -m py_compile \
            news/src/ai_market_news/collector_common.py \
            news/src/ai_market_news/collect_sec.py \
            news/src/ai_market_news/collect_company_releases.py \
            news/src/ai_market_news/normalize_news.py \
            news/src/ai_market_news/deduplicate_news.py \
            news/src/ai_market_news/tag_catalysts.py \
            news/src/ai_market_news/tag_infrastructure_layers.py \
            news/src/ai_market_news/transform_news.py

      - name: Run public news tests
        env:
          PYTHONPATH: news/src
        run: python -m unittest discover -s news/tests -p "test_*.py" -v

      - name: Run deterministic fixture pipeline
        env:
          PYTHONPATH: news/src
        run: |
          mkdir -p public-news-preview
          python -m ai_market_news.collect_sec \
            --input news/tests/fixtures/sec_filings.json \
            --output public-news-preview/sec.jsonl \
            --collected-at 2026-07-10T18:00:00Z
          python -m ai_market_news.collect_company_releases \
            --input news/tests/fixtures/company_releases.json \
            --output public-news-preview/company.jsonl \
            --collected-at 2026-07-10T18:00:00Z
          python -m ai_market_news.transform_news \
            --input public-news-preview/sec.jsonl \
            --input public-news-preview/company.jsonl \
            --output public-news-preview/news.jsonl
          python -m ai_market_news.transform_news \
            --input public-news-preview/company.jsonl \
            --input public-news-preview/sec.jsonl \
            --output public-news-preview/news-reversed.jsonl
          test "$(wc -l < public-news-preview/news.jsonl)" -eq 4
          cmp public-news-preview/news.jsonl public-news-preview/news-reversed.jsonl
          python - <<'PY'
          import json
          from pathlib import Path

          rows = [json.loads(line) for line in Path("public-news-preview/news.jsonl").read_text(encoding="utf-8").splitlines()]
          assert all(row["validation"] == "transformed_valid" for row in rows)
          assert all(row["synthetic_content_used"] is False for row in rows)
          assert all(row["source_content_modified"] is False for row in rows)
          PY

      - name: Confirm safety boundary
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path(".github/workflows/public-news-collectors.yml").read_text(encoding="utf-8")
          forbidden = (
              "secrets" + ".",
              "sche" + "dule:",
              "contents:" + " write",
          )
          for value in forbidden:
              assert value not in text, f"forbidden workflow capability: {value}"
          PY
