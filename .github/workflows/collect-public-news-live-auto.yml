name: PPI automated read-only live primary-source candidate
run-name: Automated live candidate #${{ github.run_number }}

on:
  schedule:
    - cron: "17 */6 * * 1-5"
  workflow_dispatch:
    inputs:
      sec_user_agent:
        description: Optional SEC user agent override; otherwise uses repository variable PPI_SEC_USER_AGENT
        required: false
        default: ""
        type: string
      lookback_days:
        description: Number of calendar days to inspect, from 1 through 30
        required: false
        default: "30"
        type: string

permissions:
  contents: read

concurrency:
  group: ppi-automated-readonly-live-candidate
  cancel-in-progress: false

jobs:
  candidate:
    name: Collect and independently validate a read-only candidate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SEC_USER_AGENT: ${{ github.event_name == 'workflow_dispatch' && inputs.sec_user_agent || vars.PPI_SEC_USER_AGENT }}
      LOOKBACK_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.lookback_days || '30' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate trigger configuration
        run: |
          test -n "$SEC_USER_AGENT" || {
            echo "Set repository variable PPI_SEC_USER_AGENT to an SEC-compliant organization and contact email." >&2
            exit 1
          }
          case "$SEC_USER_AGENT" in
            *@*) ;;
            *) echo "SEC user agent must contain a contact email" >&2; exit 1 ;;
          esac
          python - <<'PY'
          import os
          value = int(os.environ["LOOKBACK_DAYS"])
          assert 1 <= value <= 30
          PY

      - name: Compile candidate modules
        run: |
          python -m py_compile \
            news/src/ai_market_news/collector_common.py \
            news/src/ai_market_news/live_http.py \
            news/src/ai_market_news/sec_adapter.py \
            news/src/ai_market_news/company_feed_adapter.py \
            news/src/ai_market_news/collect_sec.py \
            news/src/ai_market_news/collect_company_releases.py \
            news/src/ai_market_news/normalize_news.py \
            news/src/ai_market_news/deduplicate_news.py \
            news/src/ai_market_news/tag_catalysts.py \
            news/src/ai_market_news/tag_infrastructure_layers.py \
            news/src/ai_market_news/transform_news.py \
            news/src/ai_market_news/build_preview_artifacts.py \
            news/src/ai_market_news/build_live_candidate_artifacts.py \
            news/src/ai_market_news/enforce_live_candidate_gate.py \
            news/src/ai_market_news/validate_live_preview_candidate.py

      - name: Run complete public-news test suite
        env:
          PYTHONPATH: news/src
        run: python -m unittest discover -s news/tests -p "test_*.py" -v

      - name: Collect allowlisted live primary sources
        env:
          PYTHONPATH: news/src
        run: |
          mkdir -p live-candidate/input live-candidate/metrics live-candidate/artifacts
          echo "START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          COLLECTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "COLLECTED_AT=$COLLECTED_AT" >> "$GITHUB_ENV"
          python -m ai_market_news.collect_sec \
            --mode live \
            --config news/config/sec_companies.json \
            --output live-candidate/input/sec.jsonl \
            --metrics-output live-candidate/metrics/sec.json \
            --collected-at "$COLLECTED_AT" \
            --user-agent "$SEC_USER_AGENT" \
            --lookback-days "$LOOKBACK_DAYS"
          python -m ai_market_news.collect_company_releases \
            --mode live \
            --config news/config/official_company_sources.json \
            --output live-candidate/input/company.jsonl \
            --metrics-output live-candidate/metrics/company.json \
            --collected-at "$COLLECTED_AT" \
            --user-agent "PPI ai-market-news (+https://github.com/poudlesuman32-star/ai-market-news)" \
            --lookback-days "$LOOKBACK_DAYS"

      - name: Normalize, deduplicate, and tag
        env:
          PYTHONPATH: news/src
        run: |
          python -m ai_market_news.transform_news \
            --input live-candidate/input/sec.jsonl \
            --input live-candidate/input/company.jsonl \
            --output live-candidate/artifacts/news.jsonl

      - name: Load provider metrics
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import json
          from pathlib import Path

          sec = json.loads(Path("live-candidate/metrics/sec.json").read_text(encoding="utf-8"))
          company = json.loads(Path("live-candidate/metrics/company.json").read_text(encoding="utf-8"))
          failures = sorted(set(sec["failures"] + company["failures"]))
          print(f"SEC_REQUEST_COUNT={int(sec['request_count'])}")
          print(f"COMPANY_REQUEST_COUNT={int(company['request_count'])}")
          print("PROVIDER_FAILURES_JSON=" + json.dumps(failures, separators=(",", ":")))
          PY

      - name: Build read-only candidate evidence
        env:
          PYTHONPATH: news/src
        run: |
          RAW_COUNT=$(($(wc -l < live-candidate/input/sec.jsonl) + $(wc -l < live-candidate/input/company.jsonl)))
          NORMALIZED_COUNT=$(wc -l < live-candidate/artifacts/news.jsonl)
          DUPLICATE_COUNT=$((RAW_COUNT - NORMALIZED_COUNT))
          RUNTIME_SECONDS=$(($(date +%s) - START_EPOCH))
          python -m ai_market_news.build_live_candidate_artifacts \
            --news live-candidate/artifacts/news.jsonl \
            --receipt-output live-candidate/artifacts/collection_receipt.json \
            --manifest-output live-candidate/artifacts/news_manifest.preview.json \
            --report-output live-candidate/artifacts/run_report.json \
            --source-commit "${GITHUB_SHA}" \
            --run-id "live-candidate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --generated-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --workflow-event "${GITHUB_EVENT_NAME}" \
            --workflow-run-id "${GITHUB_RUN_ID}" \
            --workflow-run-attempt "${GITHUB_RUN_ATTEMPT}" \
            --runtime-seconds "$RUNTIME_SECONDS" \
            --sec-request-count "$SEC_REQUEST_COUNT" \
            --company-request-count "$COMPANY_REQUEST_COUNT" \
            --raw-event-count "$RAW_COUNT" \
            --normalized-event-count "$NORMALIZED_COUNT" \
            --duplicate-count "$DUPLICATE_COUNT" \
            --provider-failures-json "$PROVIDER_FAILURES_JSON"

      - name: Enforce first-stage mixed-provider candidate gate
        env:
          PYTHONPATH: news/src
        run: |
          python -m ai_market_news.enforce_live_candidate_gate \
            --receipt live-candidate/artifacts/collection_receipt.json \
            --report live-candidate/artifacts/run_report.json

      - name: Independently recompute candidate validity
        env:
          PYTHONPATH: news/src
        run: |
          python -m ai_market_news.validate_live_preview_candidate \
            --news live-candidate/artifacts/news.jsonl \
            --receipt live-candidate/artifacts/collection_receipt.json \
            --manifest live-candidate/artifacts/news_manifest.preview.json \
            --report live-candidate/artifacts/run_report.json \
            --output live-candidate/artifacts/independent_validation.json

      - name: Upload immutable candidate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ppi-readonly-live-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: live-candidate/
          retention-days: 30
          if-no-files-found: error

      - name: Require two-validator candidate agreement
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("live-candidate/artifacts/run_report.json").read_text(encoding="utf-8"))
          independent = json.loads(Path("live-candidate/artifacts/independent_validation.json").read_text(encoding="utf-8"))
          assert report["this_run_qualifies"] is True
          assert report["qualification_exclusion_reasons"] == []
          assert all(report["live_primary_countability_checks"].values())
          assert independent["candidate_valid"] is True
          assert independent["failures"] == []
          assert independent["publication_authorized"] is False
          assert independent["official_r9_count_authorized"] is False
          assert report["published_to_repository"] is False
          assert report["contents_write_permission_authorized"] is False
          assert report["external_writes_enabled"] is False
          PY
