name: PPI R9 direct private receiver dispatch
run-name: Dispatch private receiver for publication ${{ github.event.workflow_run.id }}

on:
  workflow_run:
    workflows:
      - PPI R9 automated publication and private dispatch
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: ppi-r9-direct-private-receiver-${{ github.event.workflow_run.id }}-${{ github.event.workflow_run.run_attempt }}
  cancel-in-progress: false

env:
  EXPECTED_PUBLIC_REPOSITORY: poudlesuman32-star/ai-market-news
  EXPECTED_PRIVATE_REPOSITORY: musksuman3/ai-signal-engine
  EXPECTED_PUBLICATION_WORKFLOW_PATH: .github/workflows/ppi-r9-automated-publication.yml
  PRIVATE_RECEIVER_WORKFLOW_FILE: ppi-r9-private-receiver.yml

jobs:
  dispatch-private-receiver:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download exact publication dispatch evidence
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLICATION_RUN_ID: ${{ github.event.workflow_run.id }}
          PUBLICATION_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          set -euo pipefail
          case "$PUBLICATION_RUN_ID" in (*[!0-9]*|'') exit 1 ;; esac
          case "$PUBLICATION_RUN_ATTEMPT" in (*[!0-9]*|'') exit 1 ;; esac
          mkdir -p publication-run publication-artifact dispatch-evidence
          gh api "repos/${EXPECTED_PUBLIC_REPOSITORY}/actions/runs/${PUBLICATION_RUN_ID}" > publication-run/run.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run = json.loads(Path('publication-run/run.json').read_text(encoding='utf-8'))
          assert str(run['id']) == os.environ['PUBLICATION_RUN_ID']
          assert str(run['run_attempt']) == os.environ['PUBLICATION_RUN_ATTEMPT']
          assert run['path'] == os.environ['EXPECTED_PUBLICATION_WORKFLOW_PATH']
          assert run['status'] == 'completed' and run['conclusion'] == 'success'
          assert run['event'] in {'workflow_run', 'workflow_dispatch'}
          assert run['head_branch'] == 'main'
          assert run['head_repository']['full_name'] == os.environ['EXPECTED_PUBLIC_REPOSITORY']
          PY
          artifact_name="ppi-r9-automated-publication-${PUBLICATION_RUN_ID}-${PUBLICATION_RUN_ATTEMPT}"
          export ARTIFACT_NAME="$artifact_name"
          downloaded=false
          for attempt in 1 2 3 4 5 6; do
            rm -rf publication-artifact publication-run/artifact.zip
            mkdir -p publication-artifact
            gh api "repos/${EXPECTED_PUBLIC_REPOSITORY}/actions/runs/${PUBLICATION_RUN_ID}/artifacts" > publication-run/artifacts.json
            artifact_id="$(python - <<'PY'
          import json
          import os
          from pathlib import Path

          listing = json.loads(Path('publication-run/artifacts.json').read_text(encoding='utf-8'))
          matches = [
              item for item in listing.get('artifacts', [])
              if item.get('name') == os.environ['ARTIFACT_NAME']
              and item.get('expired') is False
              and str(item.get('workflow_run', {}).get('id', os.environ['PUBLICATION_RUN_ID']))
                  == os.environ['PUBLICATION_RUN_ID']
          ]
          if len(matches) == 1:
              print(matches[0]['id'])
          PY
            )"
            if [[ -n "$artifact_id" ]] && \
              gh api -H "Accept: application/vnd.github+json" \
                "repos/${EXPECTED_PUBLIC_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
                > publication-run/artifact.zip && \
              unzip -q publication-run/artifact.zip -d publication-artifact; then
              request_count="$(find publication-artifact -type f -name private_dispatch_request.json | wc -l)"
              if [[ "$request_count" -eq 1 ]]; then
                downloaded=true
                break
              fi
            fi
            sleep 10
          done
          test "$downloaded" = true
          request_path="$(find publication-artifact -type f -name private_dispatch_request.json -print -quit)"
          test -s "$request_path"
          cp "$request_path" dispatch-evidence/source_private_dispatch_request.json

      - name: Build exact private workflow dispatch request
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          source_path = Path('dispatch-evidence/source_private_dispatch_request.json')
          source = json.loads(source_path.read_text(encoding='utf-8'))
          assert set(source) == {'event_type', 'client_payload'}
          assert source['event_type'] == 'ppi_public_snapshot_ready'
          inputs = source['client_payload']
          expected = {
              'schema_version',
              'transaction_json',
              'public_repository',
              'public_branch',
              'publication_workflow_run_id',
              'publication_workflow_run_attempt',
              'data_commit',
              'pointer_commit',
              'snapshot_path',
              'contract_sha256',
          }
          assert isinstance(inputs, dict) and set(inputs) == expected
          assert all(isinstance(value, str) and value for value in inputs.values())
          request = {'ref': 'main', 'inputs': inputs}
          Path('dispatch-evidence/private_workflow_dispatch_request.json').write_text(
              json.dumps(request, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Dispatch exact private receiver workflow
        env:
          GH_TOKEN: ${{ secrets.PPI_CROSS_REPOSITORY_AUTOMATION }}
        run: |
          set -euo pipefail
          test -n "$GH_TOKEN"
          gh api --method POST \
            "repos/${EXPECTED_PRIVATE_REPOSITORY}/actions/workflows/${PRIVATE_RECEIVER_WORKFLOW_FILE}/dispatches" \
            --input dispatch-evidence/private_workflow_dispatch_request.json

      - name: Upload direct dispatch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ppi-r9-direct-private-receiver-${{ github.run_id }}-${{ github.run_attempt }}
          path: dispatch-evidence/
          retention-days: 90
          if-no-files-found: error
