name: Diagnose public tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run and retain public tests
        env:
          PYTHONPATH: news/src
        run: |
          set +e
          python -m unittest discover -s news/tests -p "test_*.py" -v 2>&1 | tee public-test-output.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload diagnostic output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-test-diagnostic-${{ github.run_id }}
          path: public-test-output.log
          retention-days: 1
          if-no-files-found: error
