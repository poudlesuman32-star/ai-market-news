name: Diagnose primary-source coverage tests

on:
  pull_request:
    branches: [main]
    paths:
      - "news/**"
      - ".github/workflows/diagnose-primary-source-tests.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run complete tests and retain output
        id: tests
        continue-on-error: true
        run: |
          set +e
          PYTHONPATH=news/src python -m unittest discover -s news/tests -p "test_*.py" -v \
            > complete-test-output.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat complete-test-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: complete-public-test-output
          path: complete-test-output.txt
          retention-days: 1
          if-no-files-found: error
      - name: Preserve test conclusion
        run: test "${{ steps.tests.outputs.status }}" = "0"
